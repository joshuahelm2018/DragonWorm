name: Unity Windows Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:

permissions: 
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        testMode: [ EditMode, PlayMode ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.testMode }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Run Unity Tests
        uses: game-ci/unity-test-runner@v4
        with:
          unityVersion: auto
          testMode: ${{ matrix.testMode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Upload Test Results
        uses: actions/upload-artifact@v5
        with:
          name: TestResults-${{ matrix.testMode }}
          path: artifacts
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Build Unity project
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: StandaloneWindows64
          buildName: DragonWorm
          unityVersion: auto
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: WindowsBuild
          path: build

      - name: Debug build output
        run: |
            echo "=== Build Directory ==="
            ls build || true

            echo "=== Windows Build Directory ==="
            ls build/StandaloneWindows64 || true

            echo "=== Executables ==="
            find build -name "*.exe" || true

            echo "=== Top-level files in build ==="
            find build -maxdepth 2 -type f | head -n 50

      - name: Package build (zip)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd build/StandaloneWindows64
          zip -r ../../DragonWorm_${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: DragonWorm_${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
